name: puskesmas_silangit
description: "Aplikasi Digital Puskesmas Silangit - Layanan Kesehatan Masyarakat"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"
  remove_alpha_ios: true
